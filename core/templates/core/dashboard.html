{% extends 'core/base.html' %}

{% block content %}
<div class="card shadow-sm">
    <div class="card-header bg-primary text-white">
        <h4 class="mb-0">Welcome, {{ request.user.username }}!</h4>
    </div>
    <div class="card-body">
        <div class="d-flex justify-content-between align-items-center mb-3">
        <h5 class="card-title mb-0">Your Enrolled Courses</h5>
        <a href="{% url 'export_pdf' %}" class="btn btn-success btn-sm">📄 Download Report (PDF)</a>
    </div>

        <table class="table table-striped mt-3">
            <thead>
                <tr>
                    <th>Course Name</th>
                    <th>Credits</th>
                    <th>Attendance</th>
                    <th>Grade</th> 
                    <th>Date Enrolled</th>
                </tr>
            </thead>
            
            <tbody hx-get="{% url 'dashboard_table' %}" hx-trigger="every 5s" hx-swap="innerHTML">
                {% include 'core/partials/table_data.html' %}
            </tbody>
            
        </table>
        </table>
        <hr class="my-5">
        <h5 class="card-title mb-3">Course Credits Overview</h5>

        <div style="position: relative; height:300px; width:100%">
            <canvas id="myChart"></canvas>
        </div>

    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
    // Variables ka naam 'labels' aur 'data' hi rakhna hai
    const labels = {{ course_names| safe }};
    const data = {{ course_credits| safe }};

    const ctx = document.getElementById('myChart').getContext('2d');
    const myChart = new Chart(ctx, {
        type: 'bar',
        data: {
            labels: labels, // Yahan chart aapke 'labels' variable ko use karta hai
            datasets: [{
                label: 'Course Credits',
                data: data, // Yahan 'data' variable use hota hai
                backgroundColor: 'rgba(54, 162, 235, 0.6)',
                borderColor: 'rgba(54, 162, 235, 1)',
                borderWidth: 1,
                borderRadius: 4
            }]
        },
        options: {
            maintainAspectRatio: false,
            scales: {
                y: {
                    beginAtZero: true,
                    ticks: { stepSize: 1 }
                }
            }
        }
    });
</script>
{% endblock %}
