<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | EduPulse Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #030014; }
        .mesh-gradient {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(at 0% 0%, rgba(59, 130, 246, 0.1) 0, transparent 50%), 
                              radial-gradient(at 100% 100%, rgba(147, 51, 234, 0.1) 0, transparent 50%);
            z-index: -1;
        }
        .glass-login {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        input:focus { border-color: #3b82f6 !important; box-shadow: 0 0 15px rgba(59, 130, 246, 0.2); }
    </style>
</head>
<body class="text-slate-300 min-h-screen flex items-center justify-center p-6">
    <div class="mesh-gradient"></div>

    <div class="w-full max-w-[420px] space-y-8">
        <div class="text-center">
            <div class="inline-flex size-14 bg-gradient-to-br from-blue-600 to-purple-600 rounded-2xl mb-6 shadow-xl shadow-blue-500/20"></div>
            <h1 class="text-4xl font-black text-white tracking-tighter">Access Portal</h1>
            <p class="text-slate-500 mt-2 text-sm uppercase tracking-widest font-bold">EduPulse Student OS</p>
        </div>

        <div class="glass-login p-10 rounded-[2.5rem]">
            <form method="post" class="space-y-6">
                {% csrf_token %}
                
                {% if form.errors %}
                <div class="text-xs font-bold text-red-400 bg-red-400/10 border border-red-400/20 p-3 rounded-xl text-center">
                    Authentication failed. Check credentials.
                </div>
                {% endif %}

                <div class="space-y-2">
                    <label class="text-[10px] font-black uppercase tracking-widest text-slate-500 ml-1">Identity</label>
                    <input type="text" name="username" required 
                           class="w-full bg-white/5 border border-white/10 rounded-2xl py-4 px-6 text-white focus:outline-none transition-all placeholder:text-slate-700"
                           placeholder="Username">
                </div>

                <div class="space-y-2">
                    <label class="text-[10px] font-black uppercase tracking-widest text-slate-500 ml-1">Security Key</label>
                    <input type="password" name="password" required 
                           class="w-full bg-white/5 border border-white/10 rounded-2xl py-4 px-6 text-white focus:outline-none transition-all placeholder:text-slate-700"
                           placeholder="••••••••">
                </div>

                <button type="submit" 
                        class="w-full bg-white text-black font-black py-4 rounded-2xl hover:bg-blue-500 hover:text-white transition-all active:scale-[0.98] shadow-2xl">
                    Initialize Session
                </button>
            </form>
        </div>
    </div>
</body>
</html>
