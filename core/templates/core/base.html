<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>EduPulse | Student OS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #030014; color: #94a3b8; overflow-x: hidden; }
        .glass-card { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .sidebar-transition { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body>
    
    <div class="flex min-h-screen">
        <aside id="sidebar" class="sidebar-transition fixed inset-y-0 left-0 z-50 w-64 bg-[#030014] border-r border-white/5 transform -translate-x-full lg:translate-x-0 lg:static lg:block">
            <div class="h-full flex flex-col p-6">
                <div class="flex items-center gap-3 mb-10 px-2">
                    <div class="size-8 bg-blue-600 rounded-lg flex items-center justify-center text-white font-black">E</div>
                    <span class="text-white font-black text-xl tracking-tighter">EDUPULSE</span>
                </div>
                
                <nav class="flex-1 space-y-2">
                    <a href="{% url 'dashboard' %}" class="flex items-center gap-3 p-3 rounded-xl bg-white/5 text-white font-bold transition-all">
                        <svg class="size-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
                        Dashboard
                    </a>
                    <a href="{% url 'export_pdf' %}" class="flex items-center gap-3 p-3 rounded-xl hover:bg-white/5 hover:text-white transition-all">
                        <svg class="size-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                        Reports
                    </a>
                </nav>

                <form action="{% url 'logout' %}" method="post" class="pt-4 border-t border-white/5">
                    {% csrf_token %}
                    <button type="submit" class="flex items-center gap-3 p-3 w-full text-red-500/70 hover:text-red-500 font-bold transition-all">
                        <svg class="size-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
                        Sign Out
                    </button>
                </form>
            </div>
        </aside>

        <div class="flex-1 flex flex-col min-w-0">
            <header class="lg:hidden p-4 border-b border-white/5 flex items-center justify-between bg-[#030014]/80 backdrop-blur-md sticky top-0 z-40">
                <button id="menuBtn" class="p-2 text-white">
                    <svg class="size-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path></svg>
                </button>
                <span class="font-black text-white">EDUPULSE</span>
                <div class="size-8 rounded-full bg-blue-600/20"></div>
            </header>

            <main class="flex-1 p-4 lg:p-8">
                {% block content %}{% endblock %}
            </main>
        </div>
    </div>

    <script>
        const menuBtn = document.getElementById('menuBtn');
        const sidebar = document.getElementById('sidebar');
        
        menuBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            sidebar.classList.toggle('-translate-x-full');
        });

        // Close sidebar when clicking outside on mobile
        document.addEventListener('click', (e) => {
            if (!sidebar.contains(e.target) && !menuBtn.contains(e.target)) {
                sidebar.classList.add('-translate-x-full');
            }
        });
    </script>
</body>
</html>
