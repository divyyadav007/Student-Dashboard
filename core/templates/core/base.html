<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>EduPulse Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #030014; color: #94a3b8; }
        .mesh-gradient {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                radial-gradient(at 0% 0%, rgba(59, 130, 246, 0.1) 0, transparent 50%), 
                radial-gradient(at 100% 0%, rgba(147, 51, 234, 0.1) 0, transparent 50%);
            z-index: -1;
        }
        /* Border Beam animation to make cards feel less rigid */
        .border-beam {
            position: absolute; inset: -1px; border: 1px solid rgba(59, 130, 246, 0.2); 
            border-radius: 2.5rem; transition: all 0.5s ease;
        }
    </style>
</head>
<body class="overflow-x-hidden">
    <div class="mesh-gradient"></div>
    
    <div class="flex min-h-screen relative z-10">
        <aside class="w-24 flex flex-col items-center py-10 sticky top-0 h-screen mt-4 ml-4 mb-4 glass-card rounded-[2.5rem]">
            <div class="size-10 bg-white rounded-xl flex items-center justify-center font-black text-black mb-12">E</div>
            <nav class="flex-1 space-y-8">
                <a href="{% url 'dashboard' %}" class="block text-white transition-opacity active-link-style">
                    <svg class="size-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg>
                </a>
                <a href="{% url 'export_pdf' %}" class="block text-white opacity-40 hover:opacity-100 transition-opacity">
                    <svg class="size-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z"></path></svg>
                </a>
            </nav>
            <form action="{% url 'logout' %}" method="post">
                {% csrf_token %}
                <button type="submit" class="text-red-500/50 hover:text-red-500 transition-colors">
                    <svg class="size-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
                </button>
            </form>
        </aside>

        <main class="flex-1 overflow-y-auto">
            {% block content %}{% endblock %}
        </main>
    </div>

    <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
    <script>AOS.init({ duration: 1000, once: true });</script>
</body>
</html>
